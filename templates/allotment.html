<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IPO Allotment Status | BE.IPOWALE</title>

    <link rel="icon" href="{{ url_for('static', filename='logo.jpg') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/allotment.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

</head>

<body>

<!-- ================= HERO ================= -->

<header class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <img src="{{ url_for('static', filename='logo.jpg') }}"
             class="brand-logo"
             alt="BE.IPOWALE">

        <span class="brand-name">
            BE.IPOWALE
        </span>

        <h1>
            IPO Allotment Status
        </h1>

        <p>
            Check IPO Allotment from Official Registrars
            <br>
            Fast • Trusted • Mainboard IPOs
        </p>

        <div class="hero-badges">

            <span>
                📈 Mainboard IPO
            </span>

            <span>
                ⚡ Fast Updates
            </span>

            <span>
                🏛 Official Registrars
            </span>

        </div>

    </div>

</header>

<!-- =============== LIVE TICKER =============== -->

<section class="ticker-section">

    <div class="ticker-title">

        🔥 LIVE UPDATES

    </div>

    <div class="ticker">

        <div class="ticker-content" id="ticker">

            Loading latest IPO allotments...

        </div>

    </div>

</section>

<!-- ================= MAIN ================= -->

<section class="main-container">

    <!-- SEARCH -->

    <div class="search-box">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search IPO Name...">

    </div>

    <!-- DASHBOARD -->

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-icon">
                📋
            </div>

            <div class="stat-number"
                 id="totalCount">
                 0
            </div>

            <div class="stat-text">
                Total IPOs
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon">
                🟠
            </div>

            <div class="stat-number"
                 id="upcomingCount">
                 0
            </div>

            <div class="stat-text">
                Upcoming
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon">
                🟢
            </div>

            <div class="stat-number"
                 id="availableCount">
                 0
            </div>

            <div class="stat-text">
                Available
            </div>

        </div>

        <div class="stat-card">

            <div class="stat-icon">
                🏛
            </div>

            <div class="stat-number"
                 id="registrarCount">
                 0
            </div>

            <div class="stat-text">
                Registrars
            </div>

        </div>

    </div>

    <!-- FILTERS -->

    <div class="filters">

        <button class="filter-btn active"
                data-filter="all">
            All IPOs
        </button>

        <button class="filter-btn"
                data-filter="Upcoming">
            Upcoming
        </button>

        <button class="filter-btn"
                data-filter="Available">
            Available
        </button>

        <button class="filter-btn"
                data-filter="Closed">
            Closed
        </button>

    </div>

    <!-- IPO GRID -->

    <div id="cards"
         class="cards-grid">

    </div>
