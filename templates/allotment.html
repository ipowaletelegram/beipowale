<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IPO Allotment Checker | BE.IPOWALE</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/allotment.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
        </div>

        <h1>IPO Allotment Checker</h1>

        <p class="subtitle">
            Check Mainboard IPO Allotment Instantly
        </p>

        <form id="allotmentForm">

            <label>IPO Company</label>

            <select id="company" required>

                <option value="">Select IPO</option>

            </select>

            <label>Search By</label>

            <select id="search_type">

                <option value="pan">PAN Number</option>

                <option value="application">
                    Application Number
                </option>

                <option value="dpid">
                    DP / Client ID
                </option>

            </select>

            <label>Enter Value</label>

            <input
                type="text"
                id="search_value"
                placeholder="Enter PAN / Application No / DP ID"
                required
            >

            <button type="submit">

                CHECK ALLOTMENT

            </button>

        </form>

        <div id="loading">

            <div class="spinner"></div>

            <p>Checking...</p>

        </div>

        <div id="result"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/allotment.js') }}"></script>

</body>
</html>
