<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | IPOWale</title>
  <meta name="description" content="Get in touch with IPOWALE for mainboard ipo news.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6c63ff;
      --secondary: #4d44db;
      --dark: #2a2a72;
      --light: #f7f7ff;
      --accent: #ff6b6b;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      overflow-x: hidden;
      animation: gradientShift 15s ease infinite;
      background-size: 200% 200%;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      opacity: 0;
      animation: fadeInUp 1s ease-out 0.3s forwards;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header {
      margin-bottom: 40px;
      position: relative;
    }
    
    .header h2 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--dark);
      margin-bottom: 15px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
      position: relative;
      opacity: 0;
      animation: slideInLeft 0.8s ease-out 0.5s forwards;
    }
    
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .header p {
      color: #666;
      font-size: 1.1rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.8s forwards;
    }
    
    .contact-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    
    .contact-button {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 25px;
      color: white;
      font-size: 1.1rem;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: buttonEntrance 0.6s ease-out forwards;
    }
    
    .contact-button:nth-child(1) { animation-delay: 0.9s; background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); }
    .contact-button:nth-child(2) { animation-delay: 1.1s; background: linear-gradient(135deg, #4267B2 0%, #3b5998 100%); }
    .contact-button:nth-child(3) { animation-delay: 1.3s; background: linear-gradient(135deg, #E1306C 0%, #C13584 100%); }
    .contact-button:nth-child(4) { animation-delay: 1.5s; background: linear-gradient(135deg, #EA4335 0%, #BB001B 100%); }
    .contact-button:nth-child(5) { animation-delay: 1.7s; background: linear-gradient(135deg, #0077B5 0%, #0e76a8 100%); }
    .contact-button:nth-child(6) { animation-delay: 1.9s; background: linear-gradient(135deg, #0088cc 0%, #006699 100%); }
    
    @keyframes buttonEntrance {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .contact-button i {
      margin-right: 12px;
      font-size: 1.4rem;
    }
    
    .contact-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: 0.5s;
    }
    
    .contact-button:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }
    
    .contact-button:hover::before {
      left: 100%;
    }
    
    .floating-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    
    .floating-icon {
      position: absolute;
      opacity: 0.1;
      animation: float 15s linear infinite;
    }
    
    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.1;
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
      }
    }
    
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }
    
    .particle {
      position: absolute;
      background: rgba(108, 99, 255, 0.3);
      border-radius: 50%;
      animation: particleAnimation 15s linear infinite;
    }
    
    @keyframes particleAnimation {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.3;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }
    
    .footer {
      margin-top: 50px;
      color: #666;
      font-size: 0.9rem;
      opacity: 0;
      animation: fadeIn 1s ease-out 2s forwards;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* New footer links styles */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .footer-link {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      color: var(--dark);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }
    
    .footer-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      background: rgba(255, 255, 255, 0.3);
    }
    
    .footer-link i {
      margin-right: 8px;
      font-size: 1rem;
    }
    
    .footer-link.home {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
    }
    
    .footer-link.contact {
      background: linear-gradient(135deg, #EA4335 0%, #BB001B 100%);
      color: white;
    }
    
    .footer p {
      margin-top: 15px;
    }
    
    @media (max-width: 600px) {
      .contact-buttons {
        grid-template-columns: 1fr;
      }
      
      .contact-button {
        padding: 15px 20px;
        font-size: 1rem;
      }
      
      .footer-links {
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      
      .footer-link {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="floating-icons" id="floating-icons"></div>
  
  <div class="container">
    <div class="header">
      <h2>Contact IPOWale</h2>
      <p>Follow for IPO Updates</p>
    </div>
    
    <div class="contact-buttons">
    <!---
      <a href="https://www.facebook.com/jaimin.parmar.7393" class="contact-button">
        <i class="fab fa-facebook-f"></i> Facebook
      </a> -->
      <a href="https://www.instagram.com/ipo.wale/" class="contact-button">
        <i class="fab fa-instagram"></i> Instagram
      </a>
      <a href="mailto:ipo.walee@gmail.com" class="contact-button" target="_blank">
        <i class="fas fa-envelope"></i> Email
      </a>
      
      <a href="https://t.me/ipo_wale" class="contact-button">
        <i class="fab fa-telegram-plane"></i> Telegram
      </a>
    </div>
    
    <div class="footer">
      <div class="footer-links">
        <a href="https://ipowale.onrender.com" class="footer-link home">
          <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="mailto:ipo.walee@gmail.com" class="footer-link contact">
          <i class="fas fa-envelope"></i> Contact Developer
        </a>
      </div>
      <p>© 2026 IPOWALE — All Rights Reserved.<i class="fas fa-heart" style="color: #ff4757;"></i></p>
    </div>
  </div>

  <script>
    // Create floating icons
    document.addEventListener('DOMContentLoaded', function() {
      const floatingIcons = document.getElementById('floating-icons');
      const icons = ['fa-comment', 'fa-paper-plane', 'fa-envelope', 'fa-share-alt', 'fa-at', 'fa-hashtag'];
      
      for (let i = 0; i < 15; i++) {
        const icon = document.createElement('i');
        icon.className = `floating-icon fas ${icons[Math.floor(Math.random() * icons.length)]}`;
        icon.style.left = `${Math.random() * 100}%`;
        icon.style.bottom = `-50px`;
        icon.style.fontSize = `${Math.random() * 20 + 10}px`;
        icon.style.animationDuration = `${Math.random() * 15 + 10}s`;
        icon.style.animationDelay = `${Math.random() * 5}s`;
        floatingIcons.appendChild(icon);
      }
      
      // Create particles
      const particles = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.width = `${Math.random() * 15 + 5}px`;
        particle.style.height = particle.style.width;
        particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
        particle.style.animationDelay = `${Math.random() * 5}s`;
        particles.appendChild(particle);
      }
      
      // Add hover effect to buttons
      const buttons = document.querySelectorAll('.contact-button, .footer-link');
      buttons.forEach(button => {
        button.addEventListener('mouseenter', function() {
          this.style.transform = 'translateY(-3px)';
        });
        
        button.addEventListener('mouseleave', function() {
          this.style.transform = 'translateY(0)';
        });
      });
    });
  </script>
</body>
</html>
